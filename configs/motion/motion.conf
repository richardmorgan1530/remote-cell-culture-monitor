############################################################
# Motion (global) configuration — multi-camera
############################################################

# Run under systemd without double-daemonizing
daemon off

# Log via syslog/journald (don’t write /var/log/motion/*)
log_file syslog
log_level 6

# Where Motion would save media if enabled (we keep outputs off)
target_dir /var/lib/motion

# Do NOT define a camera here — per-camera goes in thread files
# video_device /dev/video0

# Webcontrol (optional)
webcontrol_port 8080
webcontrol_localhost on
webcontrol_parms 0

# Default live-stream behavior; each thread will set its own port
stream_localhost off
stream_quality 85
stream_maxrate 15

# Motion detection defaults (safe baseline; can override per thread)
emulate_motion off
threshold 1500
despeckle_filter EedDl
minimum_motion_frames 1
event_gap 60
pre_capture 3
post_capture 0

# Disable file outputs globally (live view only)
picture_output off
movie_output off

############################################################
# Per-camera thread configs
############################################################
thread /etc/motion/thread1.conf
thread /etc/motion/thread2.conf
thread /etc/motion/thread3.conf
thread /etc/motion/thread4.conf
